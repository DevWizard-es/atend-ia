<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cargando... — AtendIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .bio-container {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .bio-avatar {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: var(--card);
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 3rem;
      margin-bottom: 24px;
      border: 3px solid var(--primary);
    }
    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-bottom: 40px;
      line-height: 1.5;
    }
    .bio-links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .bio-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 16px 20px;
      border-radius: 99px;
      text-decoration: none;
      font-weight: 500;
      font-size: 1.05rem;
      transition: all 0.2s ease;
      cursor: pointer;
      border: none;
    }
    .bio-btn.primary {
      background: var(--primary);
      color: #fff;
    }
    .bio-btn.primary:hover {
      filter: brightness(1.1);
      transform: scale(1.02);
    }
    .bio-btn.secondary {
      background: var(--card);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .bio-btn.secondary:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.2);
    }
    .footer {
      margin-top: 60px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }
    .footer a {
      color: var(--text-dim);
      text-decoration: none;
      font-weight: 600;
    }
    
    .loading-spinner {
      margin-top: 100px;
      width: 40px;
      height: 40px;
      border: 4px solid var(--card);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="bio-container" id="content" style="display:none">
    <div class="bio-avatar" id="avatarIcon">🏠</div>
    <h1 id="bioTitle">Cargando...</h1>
    <p id="bioDesc">Por favor, espera.</p>
    
    <div class="bio-links" id="linksContainer">
      <!-- Botones se inyectarán aquí -->
    </div>
  </div>

  <div class="loading-spinner" id="loader"></div>

  <div class="footer">
    Powered by <a href="/">AtendIA</a>
  </div>

  <script src="js/config.js"></script>
  <script>
    async function loadBiolink() {
      const urlParams = new URLSearchParams(window.location.search);
      const slug = urlParams.get('b');
      
      if (!slug) {
        document.getElementById('loader').style.display = 'none';
        document.getElementById('content').style.display = 'flex';
        document.getElementById('bioTitle').textContent = 'Página no encontrada';
        document.getElementById('bioDesc').textContent = 'El enlace no es válido.';
        return;
      }

      try {
        const res = await fetch(API_URL + '/biolink/' + slug);
        if (!res.ok) throw new Error('Not found');
        const data = await res.json();
        
        // Aplicar color
        if (data.color) {
          const c = data.color.replace(';', ''); // prevent inject
          document.documentElement.style.setProperty('--primary', c);
        }

        document.getElementById('bioTitle').textContent = data.display_name || 'Mi Negocio';
        document.title = (data.display_name || 'Negocio') + ' — Links';
        document.getElementById('bioDesc').textContent = data.description || '';
        
        let initialLetter = (data.display_name || 'N').charAt(0).toUpperCase();
        document.getElementById('avatarIcon').textContent = initialLetter;
        
        // Build buttons
        const cont = document.getElementById('linksContainer');
        if (data.btn_chat) {
          cont.innerHTML += `<a href="#" class="bio-btn primary" onclick="alert('Iniciando chat con IA...')">💬 Chatear con nosotros</a>`;
        }
        if (data.btn_menu) {
          cont.innerHTML += `<a href="#" class="bio-btn secondary" onclick="alert('Cargando menú...')">📋 Ver menú</a>`;
        }
        if (data.btn_res) {
          cont.innerHTML += `<a href="#" class="bio-btn secondary" onclick="alert('Módulo de reservas...')">📅 Reservar mesa</a>`;
        }
        if (data.btn_map) {
          cont.innerHTML += `<a href="#" class="bio-btn secondary" onclick="alert('Redirigiendo a Google Maps...')">📍 Cómo llegar</a>`;
        }
        if (data.btn_shop) {
          cont.innerHTML += `<a href="#" class="bio-btn secondary" onclick="alert('Abriendo tienda online...')">🛍️ Comprar online</a>`;
        }

      } catch(e) {
        document.getElementById('bioTitle').textContent = 'Página no encontrada';
        document.getElementById('bioDesc').textContent = 'Esta página ya no existe o es privada.';
      }

      document.getElementById('loader').style.display = 'none';
      document.getElementById('content').style.display = 'flex';
    }

    loadBiolink();
  </script>
</body>
</html>
