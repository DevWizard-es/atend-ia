<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat con IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #7c3aed;
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --text: #e2e8f0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; height: 100vh; }
    
    header {
      background: var(--card); padding: 20px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05);
      position: relative;
    }
    .back-btn { position: absolute; left: 15px; top: 22px; color: var(--text); text-decoration: none; font-size: 1.2rem; }
    h1 { font-size: 1.2rem; }
    p { font-size: 0.8rem; color: #94a3b8; }
    
    .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; word-wrap: break-word; }
    .bot { background: rgba(255,255,255,0.05); align-self: flex-start; border-bottom-left-radius: 4px; }
    .user { background: var(--primary); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    
    .input-area { padding: 15px; background: var(--card); display: flex; gap: 10px; border-top: 1px solid rgba(255,255,255,0.05); }
    input { flex: 1; padding: 12px 16px; border-radius: 99px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; outline: none; }
    button { background: var(--primary); color: white; border: none; padding: 0 20px; border-radius: 99px; font-weight: 600; cursor: pointer; }
    button:hover { filter: brightness(1.1); }
    .loader { font-size: 0.8rem; color: #94a3b8; align-self: flex-start; margin-left: 10px; display: none; }
  </style>
</head>
<body>

  <header>
    <a href="#" id="backBtn" class="back-btn">← Atrás</a>
    <h1 id="bTitle">Asistente IA</h1>
    <p>Respondiendo al instante</p>
  </header>

  <div class="chat-container" id="chat">
    <div class="msg bot">¡Hola! ¿En qué puedo ayudarte hoy? 🤖</div>
  </div>
  <div class="loader" id="typing">Escribiendo...</div>

  <div class="input-area">
    <input type="text" id="userInput" placeholder="Escribe un mensaje..." onkeypress="if(event.key==='Enter') sendMsg()">
    <button onclick="sendMsg()">Enviar</button>
  </div>

  <script src="js/config.js"></script>
  <script>
    const slug = new URLSearchParams(window.location.search).get('b');
    const chat = document.getElementById('chat');
    const typing = document.getElementById('typing');
    const input = document.getElementById('userInput');
    
    document.getElementById('backBtn').href = 'biolink.html?b=' + slug;

    async function sendMsg() {
      const text = input.value.trim();
      if (!text || !slug) return;
      
      // User message
      input.value = '';
      chat.innerHTML += `<div class="msg user">${text}</div>`;
      chat.scrollTop = chat.scrollHeight;
      
      typing.style.display = 'block';

      try {
        const res = await fetch(API_URL + '/public/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ slug, text })
        });
        const data = await res.json();
        
        typing.style.display = 'none';
        chat.innerHTML += `<div class="msg bot">${data.reply.replace(/\n/g, '<br>')}</div>`;
        chat.scrollTop = chat.scrollHeight;
      } catch(e) {
        typing.style.display = 'none';
        chat.innerHTML += `<div class="msg bot" style="color:#ef4444">Error de conexión.</div>`;
      }
    }
  </script>
</body>
</html>
