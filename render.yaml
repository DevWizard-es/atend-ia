services:
  - type: web
    name: atend-ia
    env: node
    plan: free
    region: frankfurt  # Closer to Spain
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        value: "" # Requires user to set this in the Render dashboard manually
      - key: TURSO_DATABASE_TOKEN
        value: "" # Requires user to set this in the Render dashboard manually
      - key: JWT_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        fromService:
          type: web
          name: atend-ia
          property: host
    healthCheckPath: /api/ping
